<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huzifa - Forex Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000 0%, #001a4d 50%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(0, 26, 77, 0.9);
            border: 2px solid #0066cc;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 102, 204, 0.3), 0 0 20px rgba(0, 102, 204, 0.2);
            text-align: center;
            animation: glowIn 0.8s ease-out;
        }

        @keyframes glowIn {
            from {
                opacity: 0;
                transform: scale(0.95);
                box-shadow: 0 0 0 rgba(0, 102, 204, 0);
            }
            to {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 8px 32px rgba(0, 102, 204, 0.3), 0 0 20px rgba(0, 102, 204, 0.2);
            }
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #0066cc;
            margin: 0 auto 30px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.5), inset 0 0 20px rgba(0, 102, 204, 0.2);
            animation: floatImage 3s ease-in-out infinite;
        }

        @keyframes floatImage {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 102, 204, 0.3);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            color: #0066cc;
            font-size: 1.1em;
            margin-bottom: 30px;
            font-weight: 600;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .marquee-container {
            background: rgba(0, 102, 204, 0.2);
            border: 1px solid #0066cc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 102, 204, 0.2);
        }

        .marquee-text {
            color: #00ff88;
            font-weight: 600;
            font-size: 0.95em;
            white-space: nowrap;
            animation: scroll 15s linear infinite;
        }

        @keyframes scroll {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        .market-status {
            background: rgba(0, 50, 100, 0.5);
            border: 1px solid #00aaff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #00ff88;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-open {
            background-color: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-closed {
            background-color: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .link-btn {
            background: linear-gradient(135deg, #0066cc 0%, #003d7a 100%);
            color: #fff;
            padding: 15px 25px;
            border: 2px solid #00aaff;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.3), 0 0 10px rgba(0, 170, 255, 0);
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            background: linear-gradient(135deg, #00aaff 0%, #0066cc 100%);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 170, 255, 0.5), 0 0 20px rgba(0, 170, 255, 0.3);
        }

        .telegram-btn {
            background: linear-gradient(135deg, #0088cc 0%, #005fa3 100%);
            border-color: #00ddff;
        }

        .telegram-btn:hover {
            background: linear-gradient(135deg, #00ddff 0%, #0088cc 100%);
            box-shadow: 0 6px 20px rgba(0, 221, 255, 0.5), 0 0 20px rgba(0, 221, 255, 0.3);
        }

        .register-btn {
            background: linear-gradient(135deg, #003d7a 0%, #001a4d 100%);
            border-color: #0066cc;
        }

        .register-btn:hover {
            background: linear-gradient(135deg, #0066cc 0%, #003d7a 100%);
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.5), 0 0 20px rgba(0, 102, 204, 0.3);
        }

        .icon {
            font-size: 1.3em;
            margin-right: 10px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 102, 204, 0.3);
        }

        .social-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #0066cc 0%, #003d7a 100%);
            border: 2px solid #00aaff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5em;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 102, 204, 0.3);
        }

        .social-icon:hover {
            background: linear-gradient(135deg, #00aaff 0%, #0066cc 100%);
            transform: scale(1.2) translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.6);
        }

        .social-icon a {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .footer-text {
            margin-top: 25px;
            color: #00ff88;
            font-size: 0.95em;
            font-weight: 600;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .gold-price {
            color: #ffd700;
            font-weight: 600;
            margin-top: 15px;
            font-size: 0.9em;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .profile-img {
                width: 120px;
                height: 120px;
            }

            .link-btn {
                padding: 12px 20px;
                font-size: 1em;
            }

            .social-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2em;
            }

            .social-icons {
                gap: 15px;
            }

            .marquee-text {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="profile.jpg" alt="Huzifa" class="profile-img">
        <h1>Huzifa</h1>
        <p class="subtitle">📈 متداول فوركس منذ 3 سنوات</p>

        <!-- آخر النتائج الناجحة -->
        <div class="marquee-container">
            <div class="marquee-text">
                🎯 آخر صفقة: XAUUSD +50 Pip | 💰 EURUSD +75 Pip | 🚀 GBPUSD +60 Pip | ✅ معدل النجاح: 85%
            </div>
        </div>

        <!-- حالة السوق -->
        <div class="market-status">
            <span class="status-dot status-open"></span>
            <span id="marketStatus">السوق مفتوح الآن</span>
            <br>
            <div class="gold-price">
                🏆 سعر الذهب: <span id="goldPrice">--</span> دولار/أونصة
            </div>
        </div>

        <!-- الأزرار الرئيسية -->
        <div class="links-container">
            <a href="https://t.me/HASKAWI_TRADING" class="link-btn telegram-btn" target="_blank">
                <span class="icon">✈️</span>توصيات مجانية على التليجرام
            </a>

            <a href="https://one.justmarkets.link/a/tuu6hv0s86" class="link-btn register-btn" target="_blank">
                <span class="icon">🚀</span>سجل تحت وكالتي
            </a>
        </div>

        <!-- أيقونات التواصل الاجتماعي -->
        <div class="social-icons">
            <a href="https://t.me/HASKAWI_TRADING" class="social-icon" title="تليجرام" target="_blank">
                ✈️
            </a>
            <a href="https://www.instagram.com/huzifa_23?igsh=eTg2NXk5cHdjODJ5" class="social-icon" title="إنستجرام" target="_blank">
                📷
            </a>
            <a href="https://www.facebook.com/share/1bWVUmqBki/" class="social-icon" title="فيسبوك" target="_blank">
                👍
            </a>
            <a href="https://wa.me/?text=Hello%20Huzifa" class="social-icon" title="واتساب" target="_blank">
                💬
            </a>
        </div>

        <p class="footer-text">💙 نساعدك على فهم الأسواق المالية بأدوات ذكية</p>
    </div>

    <script>
        // تحديث حالة السوق
        function updateMarketStatus() {
            const now = new Date();
            const day = now.getDay();
            const hours = now.getHours();
            const minutes = now.getMinutes();

            // السوق مغلق في نهاية الأسبوع
            if (day === 0 || day === 6) {
                document.getElementById('marketStatus').textContent = '🔴 السوق مغلق (نهاية الأسبوع)';
                document.querySelector('.status-dot').classList.remove('status-open');
                document.querySelector('.status-dot').classList.add('status-closed');
            } else if (hours >= 9 && hours < 17) {
                document.getElementById('marketStatus').textContent = '🟢 السوق مفتوح الآن';
                document.querySelector('.status-dot').classList.add('status-open');
                document.querySelector('.status-dot').classList.remove('status-closed');
            } else {
                document.getElementById('marketStatus').textContent = '🔴 السوق مغلق حالياً';
                document.querySelector('.status-dot').classList.remove('status-open');
                document.querySelector('.status-dot').classList.add('status-closed');
            }
        }

        // جلب سعر الذهب (API مجاني)
        function updateGoldPrice() {
            fetch('https://api.metals.live/v1/spot/gold')
                .then(response => response.json())
                .then(data => {
                    const goldPrice = (data.price / 31.1035).toFixed(2);
                    document.getElementById('goldPrice').textContent = goldPrice;
                })
                .catch(error => {
                    document.getElementById('goldPrice').textContent = '2,500+';
                });
        }

        // تحديث البيانات عند التحميل
        updateMarketStatus();
        updateGoldPrice();

        // تحديث حالة السوق كل دقيقة
        setInterval(updateMarketStatus, 60000);

        // تحديث سعر الذهب كل 10 ثواني
        setInterval(updateGoldPrice, 10000);
    </script>
</body>
</html>
